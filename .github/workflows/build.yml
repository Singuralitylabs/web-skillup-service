name: Build Test

on:
  push:
    paths:
      - "app/**"
      - "package.json"
      - "bun.lock"
      - "next.config.ts"
      - "tsconfig.json"
  pull_request:
    paths:
      - "app/**"
      - "package.json"
      - "bun.lock"
      - "next.config.ts"
      - "tsconfig.json"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
