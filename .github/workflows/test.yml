name: Vitest Unit Tests

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - "vitest.config.ts"
      - "package.json"
      - "bun.lock"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "vitest.config.ts"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test
