name: TypeScript Type Check

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type check
        run: bunx tsc --noEmit
