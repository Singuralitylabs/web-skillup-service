name: Biome Check

on:
  push:
    paths:
      - "app/**"
      - "biome.json"
      - "package.json"
      - "bun.lock"
  pull_request:
    paths:
      - "app/**"
      - "biome.json"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

jobs:
  biome:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome check
        run: bunx biome check .
